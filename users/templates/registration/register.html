{% extends "learning_logs/base.html" %}

{% load bootstrap4 %}

{% block content %}
  <h2>Register</h2>
  
  <form method="post" action="{% url 'users:register' %}" class="form-group">
    {% csrf_token %}
    {% bootstrap_form form %}
    
    {% buttons %}
      <button name="submit" class="btn btn-primary">Register</button>
      <input type="hidden" name="next" value="{% url 'learning_logs:index' %}" />
    {% endbuttons %}
  </form>

{% endblock content %}
